<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <style>
    .section-btn { margin: 5px; padding: 8px 12px; cursor: pointer; }
    .question-btn { display: block; margin: 5px 0; padding: 5px; cursor: pointer; width: 100%; text-align: left; }
    .answered { background-color: #4CAF50; color: white; }
    .unanswered { background-color: #f44336; color: white; }
    #revealBtn, #timerBtn, #nextBtn, #exportBtn { margin-top: 10px; padding: 8px 12px; cursor: pointer; }
    #leaderboard { margin-top: 20px; }
  </style>
</head>
<body>

<h2>Admin Dashboard</h2>

<h3>Sections</h3>
<div id="sectionsDiv"></div>

<h3>Questions in Section</h3>
<div id="questionsDiv"></div>

<button id="timerBtn" style="display:none;" onclick="startTimer()">Start Timer</button>
<button id="revealBtn" style="display:none;" onclick="revealCorrect()">Show Correct Answer</button>
<button id="nextBtn" style="display:none;" onclick="nextQuestion()">Next Question</button>
<button id="exportBtn" style="display:none;" onclick="exportResults()">Export Results</button>

<h3>Participants Live / Answers / Scores</h3>
<pre id="participants"></pre>

<h3>Live Leaderboard</h3>
<pre id="leaderboard"></pre>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();

  let currentSection = "";
  let sectionQuestions = [];
  let answeredStatus = [];
  let currentQuestionIndex = null;
  let scores = {};

  // Render sections
  const sections = ["Joshua","1 Kings","Proverbs","Romans","James","General Bible Knowledge"];
  const sectionsDiv = document.getElementById("sectionsDiv");
  sections.forEach(sec => {
    const btn = document.createElement("button");
    btn.innerText = sec;
    btn.className = "section-btn";
    btn.onclick = () => {
      socket.emit("start_section", sec);
      currentSection = sec;
      document.getElementById("questionsDiv").innerHTML = "";
      hideButtons();
    };
    sectionsDiv.appendChild(btn);
  });

  function hideButtons() {
    document.getElementById("revealBtn").style.display = "none";
    document.getElementById("timerBtn").style.display = "none";
    document.getElementById("nextBtn").style.display = "none";
    document.getElementById("exportBtn").style.display = "none";
  }

  // Receive section questions and answered info
  socket.on("admin_section_questions", data => {
    sectionQuestions = data.questions;
    answeredStatus = data.answered;
    renderQuestions();
  });

  function renderQuestions() {
    const questionsDiv = document.getElementById("questionsDiv");
    questionsDiv.innerHTML = "";
    sectionQuestions.forEach((q, i) => {
      const btn = document.createElement("button");
      btn.innerText = `Q${i+1}: ${q.text}`;
      btn.className = "question-btn " + (answeredStatus[i] ? "answered" : "unanswered");
      btn.onclick = () => {
        currentQuestionIndex = i;
        socket.emit("new_question", i); // send specific question index to server
        document.getElementById("revealBtn").style.display = "inline-block";
        document.getElementById("timerBtn").style.display = "inline-block";
        document.getElementById("nextBtn").style.display = "inline-block";
        document.getElementById("exportBtn").style.display = "inline-block";
      };
      questionsDiv.appendChild(btn);
    });
  }

  // Start participant timer
  function startTimer() {
    if (currentQuestionIndex === null) return;
    socket.emit("start_timer"); // participants start 15s countdown
    document.getElementById("timerBtn").style.display = "none";
  }

  // Reveal correct answer
  function revealCorrect() {
    if (currentQuestionIndex === null) return;
    socket.emit("show_correct");
    document.getElementById("revealBtn").style.display = "none";
  }

  // Move to next question sequentially
  function nextQuestion() {
    if (currentQuestionIndex === null) return;
    const nextIndex = currentQuestionIndex + 1;
    if (nextIndex < sectionQuestions.length) {
      currentQuestionIndex = nextIndex;
      socket.emit("new_question", nextIndex);
      document.getElementById("timerBtn").style.display = "inline-block";
      document.getElementById("revealBtn").style.display = "inline-block";
    } else {
      alert("End of section reached!");
      currentQuestionIndex = null;
      hideButtons();
    }
  }

  // Export results as CSV
  function exportResults() {
    let csv = "Name,Score\n";
    for (let name in scores) {
      csv += `${name},${scores[name]}\n`;
    }
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${currentSection}_results.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Update live participant list
  socket.on("participants_update", data => {
    document.getElementById("participants").innerText =
      "Participants Live:\n" + JSON.stringify(data, null, 2);
  });

  // Update live answers before reveal
  socket.on("answers_update", data => {
    let text = "Pending Answers (not scored yet):\n";
    for (let name in data.answers) {
      text += `${name}: ${data.answers[name]}\n`;
    }
    document.getElementById("participants").innerText = text;
  });

  // Show results after correct answer
  socket.on("correct_answer", data => {
    scores = data.scores;
    let text = `Correct Option: ${data.correctOption}\n\nResults:\n`;
    for (let name in data.results) {
      const res = data.results[name];
      text += `${name}: ${res.answer} → ${res.correct ? "✅ Correct" : "❌ Wrong"}\n`;
    }
    text += `\nCumulative Scores:\n`;
    for (let name in data.scores) {
      text += `${name}: ${data.scores[name]}\n`;
    }
    document.getElementById("participants").innerText = text;

    // Mark question as answered
    if (data.section === currentSection) {
      data.answeredStatus = data.answeredStatus;
      renderQuestions();
    }

    // Update live leaderboard
    renderLeaderboard();
  });

  function renderLeaderboard() {
    const leaderboardDiv = document.getElementById("leaderboard");
    let sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
    let text = "";
    sorted.forEach(([name, score], idx) => {
      text += `${idx+1}. ${name}: ${score}\n`;
    });
    leaderboardDiv.innerText = text;
  }
</script>

</body>
</html>
