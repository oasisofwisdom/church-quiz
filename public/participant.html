<!DOCTYPE html>
<html>
<head>
  <title>Church Live Quiz</title>
  <style>
    .option-btn {
      display: block;
      margin: 5px 0;
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .correct { background-color: #4CAF50; color: white; }
    .wrong { background-color: #f44336; color: white; }
    #timer { font-size: 18px; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Join the Quiz</h2>

<label>Name</label><br>
<input id="name"><br><br>

<label>Exam Number</label><br>
<input id="exam"><br><br>

<button id="joinBtn">Join</button>

<div id="questionDiv" style="display:none; margin-top:20px;">
  <h3 id="questionText"></h3>
  <div id="options"></div>
  <div id="timer"></div>
</div>

<div id="scoreDiv" style="display:none; margin-top:20px;">
  <h3>Your Score</h3>
  <p id="scoreText">0</p>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "";
  let myScore = 0;
  let selectedBtn = null;
  let timerInterval = null;

  document.getElementById("joinBtn").onclick = () => {
    const name = document.getElementById("name").value.trim();
    const exam = document.getElementById("exam").value.trim();

    if (!name || !exam) {
      alert("Please enter both name and exam number.");
      return;
    }

    myName = name;
    socket.emit("join", { name, examNumber: exam });
    alert("Joined as " + name);

    document.getElementById("joinBtn").disabled = true;
    document.getElementById("name").disabled = true;
    document.getElementById("exam").disabled = true;
    document.getElementById("scoreDiv").style.display = "block";
  };

  // Receive question
  socket.on("question", q => {
    document.getElementById("questionDiv").style.display = "block";
    document.getElementById("questionText").innerText = q.text;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";
    selectedBtn = null;

    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.className = "option-btn";
      btn.onclick = () => {
        socket.emit("answer", { answer: opt });
        selectedBtn = btn;
        Array.from(optionsDiv.children).forEach(b => b.disabled = true);
        stopTimer();
      };
      optionsDiv.appendChild(btn);
    });

    // Clear previous timer
    stopTimer();
    document.getElementById("timer").innerText = "";
  });

  // Start 15-second countdown when admin triggers
  socket.on("start_timer", () => {
    let timeLeft = 15;
    const timerDiv = document.getElementById("timer");
    timerDiv.innerText = `Time left: ${timeLeft}s`;

    timerInterval = setInterval(() => {
      timeLeft--;
      timerDiv.innerText = `Time left: ${timeLeft}s`;
      if (timeLeft <= 0) {
        stopTimer();
        disableOptions();
      }
    }, 1000);
  });

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function disableOptions() {
    const optionsDiv = document.getElementById("options");
    Array.from(optionsDiv.children).forEach(b => b.disabled = true);
  }

  // Receive correct answer & results
  socket.on("correct_answer", data => {
    stopTimer();
    const optionsDiv = document.getElementById("options");
    const correctOpt = data.correctOption;

    Array.from(optionsDiv.children).forEach(btn => {
      if (btn.innerText.startsWith(correctOpt)) {
        btn.classList.add("correct");
      } else if (selectedBtn && btn.innerText === selectedBtn.innerText) {
        btn.classList.add("wrong");
      }
      btn.disabled = true;
    });

    if (myName in data.scores) {
      myScore = data.scores[myName];
      document.getElementById("scoreText").innerText = myScore;
    }
  });
</script>

</body>
</html>
