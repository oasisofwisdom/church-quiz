<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BBC 7.0 Quiz</title>
<style>
  body { font-family: Arial; margin:0; padding:0; background:#fefbf6; text-align:center;}
  header { background:#4CAF50; color:white; padding:10px; }
  .container { padding:10px; max-width:600px; margin:auto;}
  input { padding:8px; width:90%; margin:5px 0; }
  button { padding:10px 15px; margin:5px; border:none; border-radius:5px; cursor:pointer; }
  .option-btn { display:block; width:100%; margin:5px 0; padding:10px; cursor:pointer; }
  .correct { background:#4CAF50; color:white; }
  .wrong { background:#f44336; color:white; }
  #questionDiv { margin-top:20px; display:none; }
  #message { font-style:italic; margin-top:15px; color:#555; }
  #scoreDiv { margin-top:15px; display:none; }
  @media(max-width:600px){ input, button{ width:100%; } }
</style>
</head>
<body>

<header>
  <h2>Oasis of Wisdom Bible Church - BBC 7.0</h2>
  <p><em>Theme: Walking in Covenant Perfection | Matthew 5:48</em></p>
</header>

<div class="container">
  <div id="joinDiv">
    <input id="name" placeholder="Your Name"><br>
    <input id="exam" placeholder="Exam Number"><br>
    <button id="joinBtn">Join Quiz</button>
  </div>

  <div id="quizDiv" style="display:none;">
    <div id="message">
      Welcome to BBC 7.0 Quiz Page.<br>
      <span id="waitMsg">Waiting for Quiz Master to begin Quiz...</span>
    </div>

    <div id="questionDiv">
      <h3 id="questionText"></h3>
      <div id="options"></div>
    </div>

    <div id="timerDiv">Timer: <span id="timer">0</span></div>

    <div id="scoreDiv">
      <h3>Your Score</h3>
      <p id="scoreText">0</p>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = "";
  let myScore = 0;
  let selectedBtn = null;
  let timerInterval = null;

  document.getElementById("joinBtn").onclick = () => {
    const name = document.getElementById("name").value.trim();
    const exam = document.getElementById("exam").value.trim();
    if(!name || !exam){ alert("Enter both fields."); return; }
    myName = name;
    socket.emit("join", {name, examNumber:exam});
    document.getElementById("joinDiv").style.display="none";
    document.getElementById("quizDiv").style.display="block";
    document.getElementById("scoreDiv").style.display="block";
  };

  socket.on("question", q=>{
    document.getElementById("message").style.display="none";
    document.getElementById("questionDiv").style.display="block";
    document.getElementById("questionText").innerText = q.text;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML="";
    selectedBtn = null;

    q.options.forEach(opt=>{
      const btn = document.createElement("button");
      btn.innerText = opt;
      btn.className = "option-btn";
      btn.onclick = ()=>{
        socket.emit("answer",{answer:opt});
        selectedBtn = btn;
        Array.from(optionsDiv.children).forEach(b=>b.disabled=true);
      };
      optionsDiv.appendChild(btn);
    });
  });

  socket.on("start_timer", ()=>{
    clearInterval(timerInterval);
    let t = 15;
    document.getElementById("timer").innerText = t;
    timerInterval = setInterval(()=>{
      t--;
      document.getElementById("timer").innerText = t;
      if(t<=0) clearInterval(timerInterval);
    },1000);
  });

  socket.on("correct_answer", data=>{
    const optionsDiv = document.getElementById("options");
    const correctOpt = data.correctOption;
    Array.from(optionsDiv.children).forEach(btn=>{
      if(btn.innerText.startsWith(correctOpt)) btn.classList.add("correct");
      else if(selectedBtn && btn.innerText===selectedBtn.innerText) btn.classList.add("wrong");
      btn.disabled=true;
    });
    if(myName in data.scores){
      myScore = data.scores[myName];
      document.getElementById("scoreText").innerText=myScore;
    }
  });

  socket.on("display_message", msg=>{
    document.getElementById("questionDiv").style.display="none";
    document.getElementById("message").style.display="block";
    document.getElementById("waitMsg").innerText = msg;
  });
</script>

</body>
</html>
