<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BBC 7.0 Quiz Participant</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Roboto',sans-serif; margin:0; background:#f9f9f9; color:#333; }
    header { background:#4CAF50; color:white; text-align:center; padding:15px; }
    header h1 { margin:5px 0; font-size:22px; }
    header h2 { margin:0; font-size:14px; font-weight:400; }
    main { padding:20px; max-width:600px; margin:auto; }
    input { padding:8px; width:100%; margin:5px 0 15px; border-radius:5px; border:1px solid #ccc; }
    button { padding:10px 15px; border:none; border-radius:6px; cursor:pointer; margin:5px 0; background:#FFEB3B; color:#333; font-size:14px; }
    button:hover { opacity:0.9; }
    .option-btn { display:block; width:100%; text-align:left; margin:5px 0; padding:10px; border-radius:6px; border:none; cursor:pointer; background:#FF9800; color:white; font-size:14px; }
    .option-btn.correct { background:#4CAF50; }
    .option-btn.wrong { background:#f44336; }
    .timer { font-size:18px; margin-top:10px; font-weight:bold; color:#4CAF50; }
    footer { background:#333; color:white; text-align:center; padding:15px; margin-top:30px; font-size:14px; }
  </style>
</head>
<body>
<header>
  <h1>Oasis of Wisdom Bible Church</h1>
  <h2>Back to the Bible Challenge (BBC) 7.0</h2>
  <p>Theme: Walking in Covenant Perfection - Matthew 5:48</p>
</header>
<main>
  <label>Name</label>
  <input id="name" placeholder="Enter your name">
  <label>Exam Number</label>
  <input id="exam" placeholder="Enter your exam number">
  <button id="joinBtn">Join Quiz</button>

  <div id="questionDiv" style="display:none; margin-top:20px;">
    <h3 id="questionText"></h3>
    <div id="options"></div>
    <div class="timer">Time Left: <span id="timer">0</span>s</div>
  </div>

  <div id="scoreDiv" style="display:none; margin-top:20px;">
    <h3>Your Score</h3>
    <p id="scoreText">0</p>
  </div>
</main>
<footer>
  BBC! The Word in my heart and acts.<br>
  BB&C! Believing and Behaving the Bible
</footer>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName="", myScore=0, selectedBtn=null;
  let countdownInterval=null;

  document.getElementById("joinBtn").onclick=()=>{
    const name=document.getElementById("name").value.trim();
    const exam=document.getElementById("exam").value.trim();
    if(!name||!exam){alert("Enter both name and exam number"); return;}
    myName=name;
    socket.emit("join",{name,examNumber:exam});
    document.getElementById("joinBtn").disabled=true;
    document.getElementById("name").disabled=true;
    document.getElementById("exam").disabled=true;
    document.getElementById("scoreDiv").style.display="block";
  };

  socket.on("question",q=>{
    document.getElementById("questionDiv").style.display="block";
    document.getElementById("questionText").innerText=q.text;
    const optionsDiv=document.getElementById("options");
    optionsDiv.innerHTML="";
    selectedBtn=null;

    q.options.forEach(opt=>{
      const btn=document.createElement("button");
      btn.innerText=opt;
      btn.className="option-btn";
      btn.onclick=()=>{
        socket.emit("answer",{answer:opt});
        selectedBtn=btn;
        Array.from(optionsDiv.children).forEach(b=>b.disabled=true);
      };
      optionsDiv.appendChild(btn);
    });
  });

  socket.on("start_timer",()=>{
    let time=15;
    const timerDisplay=document.getElementById("timer");
    timerDisplay.innerText=time;
    if(countdownInterval) clearInterval(countdownInterval);
    countdownInterval=setInterval(()=>{
      time--;
      timerDisplay.innerText=time;
      if(time<=0){ clearInterval(countdownInterval); }
    },1000);
  });

  socket.on("correct_answer",data=>{
    const optionsDiv=document.getElementById("options");
    const correct=data.correctOption;
    Array.from(optionsDiv.children).forEach(btn=>{
      if(btn.innerText.startsWith(correct)) btn.classList.add("correct");
      else if(selectedBtn && btn.innerText===selectedBtn.innerText) btn.classList.add("wrong");
      btn.disabled=true;
    });
    if(myName in data.scores){ myScore=data.scores[myName]; document.getElementById("scoreText").innerText=myScore; }
  });
</script>
</body>
</html>
