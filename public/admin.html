<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Oasis of Wisdom Bible Church - BBC 7.0 Admin</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    h1 { color: #2E7D32; }
    #sectionSelect, #startSectionBtn, #nextQuestionBtn, #showCorrectBtn, #sendMessageBtn, #exportBtn { margin: 5px 0; padding: 8px; font-size: 16px; }
    #questionText { font-size: 18px; margin-top: 10px; }
    #participants, #leaderboard { white-space: pre-line; background: #fff; padding: 10px; border: 1px solid #ccc; margin-top: 10px; max-height: 300px; overflow-y: auto; }
    #timer { font-size: 20px; font-weight: bold; color: #d32f2f; margin-top: 10px; }
    #messageInput { width: 100%; padding: 6px; margin-top: 5px; }
    button { cursor: pointer; }
  </style>
</head>
<body>
  <h1>Oasis of Wisdom Bible Church</h1>
  <h2>Back to the Bible Challenge (BBC) 7.0</h2>
  <p><em>Theme: Walking in Covenant Perfection. Matthew 5:48</em></p>

  <label for="sectionSelect">Select Section:</label><br>
  <select id="sectionSelect"></select>
  <button id="startSectionBtn">Start Section</button>

  <h3>Current Question</h3>
  <div id="questionText">No question yet</div>
  <div id="timer">0</div>
  <button id="showCorrectBtn">Show Correct Answer</button>
  <button id="nextQuestionBtn">Next Question</button>

  <h3>Send Message to Participants</h3>
  <input type="text" id="messageInput" placeholder="Enter message">
  <button id="sendMessageBtn">Send Message</button>

  <h3>Participants & Answers</h3>
  <div id="participants">Waiting for participants...</div>

  <h3>Live Leaderboard</h3>
  <div id="leaderboard">No scores yet</div>

  <button id="exportBtn">Export Results</button>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let currentSection = "";
    let currentQuestion = {};
    let answeredStatus = [];
    let timerInterval = null;
    let timeLeft = 15;

    // Populate sections dropdown
    socket.on("sections_list", sections => {
      const select = document.getElementById("sectionSelect");
      select.innerHTML = "";
      sections.forEach(sec => {
        const opt = document.createElement("option");
        opt.value = sec;
        opt.textContent = sec;
        select.appendChild(opt);
      });
    });

    // Start a section
    document.getElementById("startSectionBtn").onclick = () => {
      const sec = document.getElementById("sectionSelect").value;
      if (!sec) return alert("Select a section first");
      currentSection = sec;
      socket.emit("start_section", sec);
    };

    // Receive admin section questions
    socket.on("admin_section_questions", data => {
      answeredStatus = data.answered;
    });

    // Receive question
    socket.on("question", q => {
      currentQuestion = q;
      document.getElementById("questionText").innerText = q.text;
      startTimer(15); // start 15s countdown
    });

    // Show correct
    document.getElementById("showCorrectBtn").onclick = () => {
      socket.emit("show_correct");
    };

    // Next question
    document.getElementById("nextQuestionBtn").onclick = () => {
      socket.emit("next_question");
      resetTimer();
    };

    // Send message to participants
    document.getElementById("sendMessageBtn").onclick = () => {
      const msg = document.getElementById("messageInput").value.trim();
      if (!msg) return alert("Enter a message");
      socket.emit("admin_message", msg);
    };

    // Participants live updates
    socket.on("participants_update", data => {
      document.getElementById("participants").innerText =
        "Participants Live:\n" + JSON.stringify(data, null, 2);
    });

    // Answers update
    socket.on("answers_update", data => {
      let text = "Pending Answers (not scored yet):\n";
      for(let name in data.answers){
        text += `${name}: ${data.answers[name]}\n`;
      }
      document.getElementById("participants").innerText = text;
    });

    // Correct answer results
    socket.on("correct_answer", data => {
      let text = `Correct Option: ${data.correctOption}\n\nResults:\n`;
      for(let name in data.results){
        const res = data.results[name];
        text += `${name}: ${res.answer} → ${res.correct ? "✅ Correct" : "❌ Wrong"}\n`;
      }
      text += `\nCumulative Scores:\n`;
      for(let name in data.scores) text += `${name}: ${data.scores[name]}\n`;
      document.getElementById("participants").innerText = text;
      answeredStatus[data.questionIndex] = true;
      resetTimer();
    });

    // Leaderboard live
    socket.on("leaderboard_update", data => {
      let text = "";
      for(let name in data) text += `${name}: ${data[name]}\n`;
      document.getElementById("leaderboard").innerText = text;
    });

    // Export results
    document.getElementById("exportBtn").onclick = () => {
      socket.emit("export_results");
      alert("Results exported to server CSV file.");
    };

    // TIMER FUNCTIONS
    function startTimer(seconds) {
      clearInterval(timerInterval);
      timeLeft = seconds;
      document.getElementById("timer").innerText = timeLeft;
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;
        if (timeLeft <= 0) clearInterval(timerInterval);
      }, 1000);
      socket.emit("start_timer"); // notify participants
    }

    function resetTimer() {
      clearInterval(timerInterval);
      document.getElementById("timer").innerText = 0;
    }

  </script>
</body>
</html>
